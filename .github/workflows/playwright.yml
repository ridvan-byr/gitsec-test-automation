name: Playwright E2E

on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      WORKSPACE_ID: ${{ secrets.WORKSPACE_ID || '28' }}
      DASHBOARD_BASE_URL: ${{ secrets.DASHBOARD_BASE_URL || 'https://staging.dashboard.gitsec.io' }}
      API_BASE_URL: ${{ secrets.API_BASE_URL || 'https://staging.api.gitsec.io' }}
      E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
      E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
      GITHUB_TEST_USER: ${{ secrets.GITHUB_TEST_USER }}
      GITHUB_TEST_PASSWORD: ${{ secrets.GITHUB_TEST_PASSWORD }}
      AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      GITHUB_MAIL_USER: ${{ secrets.GITHUB_MAIL_USER }}
      GITHUB_MAIL_PASSWORD: ${{ secrets.GITHUB_MAIL_PASSWORD }}
      GOOGLE_TEST_USER: ${{ secrets.GOOGLE_TEST_USER }}
      GOOGLE_TEST_PASSWORD: ${{ secrets.GOOGLE_TEST_PASSWORD }}
      GOOGLE_TOTP_SECRET: ${{ secrets.GOOGLE_TOTP_SECRET }}
      AZURE_CONNECTION_STRING: ${{ secrets.AZURE_CONNECTION_STRING }}
      HUAWEI_ACCESS_KEY_ID: ${{ secrets.HUAWEI_ACCESS_KEY_ID }}
      HUAWEI_SECRET_ACCESS_KEY: ${{ secrets.HUAWEI_SECRET_ACCESS_KEY }}
      HUAWEI_BUCKET: ${{ secrets.HUAWEI_BUCKET }}
      HUAWEI_REGION: ${{ secrets.HUAWEI_REGION }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run linter
        run: npm run lint
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chrome
      - name: Install Playwright OS dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chrome
      - name: Run tagged smoke and regression suite
        run: npx playwright test --grep "@smoke|@critical|@daily|@weekly|@monthly|@cron|@regression|@mocked"
      - name: Upload artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-report
          path: |
            playwright-report
            test-results
          retention-days: 14

  nightly-full:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      WORKSPACE_ID: ${{ secrets.WORKSPACE_ID }}
      DASHBOARD_BASE_URL: ${{ secrets.DASHBOARD_BASE_URL }}
      API_BASE_URL: ${{ secrets.API_BASE_URL }}
      E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
      E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
      GITHUB_TEST_USER: ${{ secrets.GITHUB_TEST_USER }}
      GITHUB_TEST_PASSWORD: ${{ secrets.GITHUB_TEST_PASSWORD }}
      AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      GITHUB_MAIL_USER: ${{ secrets.GITHUB_MAIL_USER }}
      GITHUB_MAIL_PASSWORD: ${{ secrets.GITHUB_MAIL_PASSWORD }}
      GOOGLE_TEST_USER: ${{ secrets.GOOGLE_TEST_USER }}
      GOOGLE_TEST_PASSWORD: ${{ secrets.GOOGLE_TEST_PASSWORD }}
      GOOGLE_TOTP_SECRET: ${{ secrets.GOOGLE_TOTP_SECRET }}
      AZURE_CONNECTION_STRING: ${{ secrets.AZURE_CONNECTION_STRING }}
      HUAWEI_ACCESS_KEY_ID: ${{ secrets.HUAWEI_ACCESS_KEY_ID }}
      HUAWEI_SECRET_ACCESS_KEY: ${{ secrets.HUAWEI_SECRET_ACCESS_KEY }}
      HUAWEI_BUCKET: ${{ secrets.HUAWEI_BUCKET }}
      HUAWEI_REGION: ${{ secrets.HUAWEI_REGION }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run linter
        run: npm run lint
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chrome
      - name: Install Playwright OS dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chrome
      - name: Run full suite
        run: npx playwright test --grep-invert "@manual-interactive"
      - name: Upload artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-nightly-report
          path: |
            playwright-report
            test-results
          retention-days: 14

